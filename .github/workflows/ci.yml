name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DRENG_ENABLE_VALIDATION=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Windows)
        if: runner.os == 'Windows'
        env:
          VK_LAYER_KHRONOS_validation: 1
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test (macOS)
        if: runner.os == 'macOS'
        env:
          MTL_DEBUG_LAYER: 1
          MTL_SHADER_VALIDATION: 1
        run: ctest --test-dir build --output-on-failure

  webgpu-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: |
            ~/.emscripten_cache
            ~/.emscripten_ports
          key: emsdk-${{ runner.os }}-3.1.64

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Prepare Web assets
        run: |
          test -d web

      - name: Fetch Dawn
        run: |
          ./scripts/fetch_dawn.sh

      - name: Build Dawn (Web)
        run: |
          python3 ./scripts/build_dawn_web.py

      - name: Install Playwright Chromium
        run: |
          if [ ! -f package.json ]; then\n            npm init -y\n          fi\n          npm install --save-dev playwright\n          npx playwright install --with-deps chromium

      - name: Run WebGPU smoke test
        run: |
          python3 -m http.server 8000 --directory web &
          sleep 2
          node web/smoke_test.js
